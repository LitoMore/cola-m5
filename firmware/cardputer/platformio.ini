[env:cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_flags =
  --no-stub
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
lib_deps =
  https://github.com/m5stack/M5Cardputer.git
  links2004/WebSockets@^2.6.1
  bblanchon/ArduinoJson@^7.4.2
